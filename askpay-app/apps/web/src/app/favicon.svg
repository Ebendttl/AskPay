<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AskPay">
  <!-- Background: deep navy, large rounded corners -->
  <rect width="512" height="512" rx="110" ry="110" fill="#0D1B2A"/>

  <!--
    Speech bubble (white, flat):
    Body: rounded rect, tail: polygon pointing bottom-left
  -->
  <!-- Bubble body -->
  <rect x="80" y="108" width="310" height="210" rx="36" ry="36" fill="#FFFFFF"/>
  <!-- Bubble tail (bottom-left pointing) -->
  <polygon points="128,318 128,378 188,318" fill="#FFFFFF"/>

  <!--
    Coin badge (Celo green #17A865):
    Positioned overlapping bottom-right of bubble
  -->
  <!-- Coin circle — white ring for separation from bubble -->
  <circle cx="352" cy="334" r="88" fill="#0D1B2A"/>
  <!-- Coin face -->
  <circle cx="352" cy="334" r="76" fill="#17A865"/>

  <!--
    Dollar sign (white, clean, geometric):
    Drawn as two stacked rounded rects (the S body) + two lines (the vertical bar)
  -->
  <!-- Dollar sign vertical bar -->
  <rect x="347" y="270" width="10" height="128" rx="5" ry="5" fill="#FFFFFF"/>
  <!-- Dollar sign S-curve top arc — approximated with two clean rects -->
  <path
    d="M326 296 Q326 274 352 274 Q378 274 378 298 Q378 318 352 322 Q326 326 326 350 Q326 374 352 374 Q378 374 378 352"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="13"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
